name: Immo-Scanner Freiburg - Taeglicher Scan

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Abhaengigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright Browser installieren
        run: |
          playwright install chromium --with-deps

      - name: SQLite Datenbank aus Cache
        uses: actions/cache@v4
        with:
          path: immo_scanner.db
          key: immo-db-${{ github.run_number }}
          restore-keys: |
            immo-db-

      - name: Immo-Scanner ausfuehren
        env:
          GOOGLE_SHEETS_WEBAPP_URL: ${{ secrets.GOOGLE_SHEETS_WEBAPP_URL }}
        run: |
          python main.py

      - name: Datenbank sichern (Artefakt)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: immo-scanner-db-${{ github.run_number }}
          path: immo_scanner.db
          retention-days: 30

  deploy-pwa:
    runs-on: ubuntu-22.04
    needs: scan
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v4

      - name: PWA Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
