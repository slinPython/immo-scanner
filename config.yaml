# Immo-Scanner Freiburg & Umgebung - Konfiguration

# Standorte einzeln definiert (kein Radius, sondern exakte Orte)
locations:
  - name: "Freiburg im Breisgau"
    slug_is24: "freiburg-im-breisgau"
    slug_immowelt: "freiburg-im-breisgau"
    slug_ka: "freiburg"
    ka_code: "l9356"
  - name: "Emmendingen"
    slug_is24: "emmendingen"
    slug_immowelt: "emmendingen"
    slug_ka: "emmendingen"
    ka_code: "l9289"
  - name: "Denzlingen"
    slug_is24: "denzlingen"
    slug_immowelt: "denzlingen"
    slug_ka: "denzlingen"
    ka_code: "l9283"
  - name: "Waldkirch"
    slug_is24: "waldkirch"
    slug_immowelt: "waldkirch"
    slug_ka: "waldkirch"
    ka_code: "l9372"
  - name: "Kirchzarten"
    slug_is24: "kirchzarten"
    slug_immowelt: "kirchzarten"
    slug_ka: "kirchzarten"
    ka_code: "l9317"
  - name: "Schallstadt"
    slug_is24: "schallstadt"
    slug_immowelt: "schallstadt"
    slug_ka: "schallstadt"
    ka_code: "l9356"
  - name: "Weil am Rhein"
    slug_is24: "weil-am-rhein"
    slug_immowelt: "weil-am-rhein"
    slug_ka: "weil-am-rhein"
    ka_code: "l9377"
  - name: "Loerrach"
    slug_is24: "loerrach"
    slug_immowelt: "loerrach"
    slug_ka: "loerrach"
    ka_code: "l9330"

search:
  rooms_min: 1
  rooms_max: 4
  price_max: 440000  # 4 Zimmer * 110k = 440k
  property_types:
    - "Wohnung"
  exclude:
    - "Erbbaurecht"
    - "Zwangsversteigerung"
    - "Neubau"
    - "Erstbezug"

  # Kaufpreisgrenze pro Zimmer
  max_preis_pro_zimmer: 110000

# Bierdeckelrechnung Parameter
bierdeckel:
  # Normalvermietung
  miete_normal_qm: 12.0
  min_rendite_normal: 5.0

  # WG-Vermietung
  miete_wg_zimmer: 420.0
  min_rendite_wg: 6.0

  # Kaufnebenkosten Baden-Wuerttemberg
  nk_ohne_makler: 0.07
  nk_mit_makler: 0.1057

# Scoring-Gewichte (max 100 Punkte)
scoring:
  rendite_normal: 35
  rendite_wg: 25
  preis_pro_zimmer: 20
  lage: 10
  leerstand: 5
  wg_geeignet: 5

# Bevorzugte Stadtteile / Orte
gute_stadtteile:
  - "Freiburg"
  - "Wiehre"
  - "Herdern"
  - "Stuehlinger"
  - "Kirchzarten"
  - "Emmendingen"
  - "Denzlingen"
  - "Waldkirch"
  - "Schallstadt"
  - "Weil am Rhein"
  - "Loerrach"

# Plattformen
platforms:
  immoscout:
    enabled: true
    max_pages: 3
  immowelt:
    enabled: true
    max_pages: 2
  kleinanzeigen:
    enabled: true
    max_pages: 3
